<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — LucidClaim</title>
<meta name="description" content="Request a demo or pilot of LucidClaim's AI clinical coding platform.">
<link rel="stylesheet" href="assets/style.css?v=3">
</head>
<body>

<header>
  <nav>
    <a class="logo" href="index.html"><div class="logo-badge">Lc</div>LucidClaim</a>
    <input type="checkbox" id="nav-check" class="nav-check" aria-hidden="true">
    <label for="nav-check" class="nav-toggle" aria-label="Open navigation menu">
      <span class="nav-toggle-bars" aria-hidden="true"><span></span><span></span><span></span></span>
    </label>
    <div class="nav-menu" id="nav-menu">
      <div class="nav-menu-panel">
        <div class="navlinks">
        <a href="product.html">Product</a>
        <a href="workflow.html">Workflow</a>
        <a href="pricing.html">Pricing</a>
        <a href="team.html">Team</a>
        <a href="roadmap.html">Roadmap</a>
      </div>
      <a href="contact.html" class="btn btn-primary nav-cta">Request a Demo</a>
      </div>
    </div>
  </nav>
</header>

<div class="page-head">
  <div class="wrap">
    <div class="eyebrow">Contact</div>
    <h1>Request a demo</h1>
    <p>Tell us about your practice and we'll set up time to walk through LucidClaim on a real note.</p>
  </div>
</div>

<section>
  <div class="wrap">
    <form id="lead-form" class="form-card">
      <div class="form-row">
        <label for="name">Full name *</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="form-row">
        <label for="email">Work email *</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-row">
        <label for="practice">Practice / organization</label>
        <input type="text" id="practice" name="practice">
      </div>
      <div class="form-row">
        <label for="interest">I'm interested in</label>
        <select id="interest" name="interest">
          <option>Demo of the coding engine</option>
          <option>Pilot program</option>
          <option>Subscription pricing</option>
          <option>Usage-based pricing</option>
          <option>Just exploring</option>
        </select>
      </div>
      <div class="form-row">
        <label for="message">Anything else we should know?</label>
        <textarea id="message" name="message"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Request a Demo</button>
      <div id="form-status" class="form-status"></div>
    </form>
  </div>
</section>

<footer>
  <div class="wrap">
    <a class="logo" href="index.html"><div class="logo-badge">Lc</div>LucidClaim</a>
    <div>AI-Powered Clinical Coding · Psychiatry Billing Solutions</div>
  </div>
</footer>

<script src="assets/main.js?v=3"></script>
</body>
</html>
